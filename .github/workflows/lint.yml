name: CI

on:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20] # test multiple runtimes

    steps:
    - uses: actions/checkout@v4
  
    - name: ⚙️ Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
  
    - name: 📦 Setup pnpm
      run: |
        corepack enable
        corepack prepare pnpm@8.15.7 --activate
  
    - name: 📦 Install
      run: pnpm install --frozen-lockfile
  
    - name: 🧪 Test
      run: pnpm test
