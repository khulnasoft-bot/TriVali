name: Test
on:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: |
          corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test